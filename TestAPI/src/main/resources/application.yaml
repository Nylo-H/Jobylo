spring:
  application:
    name: TestAPI

  datasource:
    url: jdbc:postgresql://localhost:5432/joboffer
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  expiration: 86400000
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui/

file:
  upload-dir: uploads/kyc

payment:
  commission-percentage: 5
  default-method: DEMO

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
