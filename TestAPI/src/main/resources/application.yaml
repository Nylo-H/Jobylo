spring:
  application:
    name: TestAPI

  datasource:
    url: jdbc:postgresql://localhost:5432/joboffer
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

jwt:
  expiration: 86400000
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui/

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
